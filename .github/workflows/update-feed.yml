name: Update vulnerability feed

# Refreshes feed.json from the latest Magento / Adobe Commerce security sources via the
# Gemini API (Google Search grounding) and commits it when it changes. New vulnerabilities simply
# land in feed.json (which the module reads); signature proposals are a separate repo's workflow.
#
# Setup (once):
#   gh secret set GEMINI_API_KEY --repo c0defusi0n/securityscanner-feed
#   # optional, to use a different model (default gemini-2.5-flash):
#   gh variable set GEMINI_MODEL --repo c0defusi0n/securityscanner-feed --body gemini-3.5-flash

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours (offset off the hour to avoid peak load)
  workflow_dispatch: {}        # manual "Run workflow" button for testing

permissions:
  contents: write   # commit + push feed.json

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate feed
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}   # optional override; defaults to gemini-2.5-flash
        run: python3 scripts/generate_feed.py

      - name: Commit and push on change
        run: |
          if git diff --quiet -- feed.json; then
            echo "feed.json unchanged — nothing to do."
            exit 0
          fi
          git config user.name "c0defusi0n"
          git config user.email "cedricbonfigli@outlook.fr"
          git add feed.json
          git commit -m "Update vulnerability feed"
          git push
